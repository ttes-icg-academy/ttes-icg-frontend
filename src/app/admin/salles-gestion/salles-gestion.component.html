<div class="page">
  <h1>Gestion des salles</h1>

  <form [formGroup]="form" (ngSubmit)="ajouter()" class="card form-inline">
    <input formControlName="nom" placeholder="Nom de la salle" />
    <input type="number" formControlName="capacite" placeholder="Capacité" />
    <button type="submit" class="btn-primary">Ajouter</button>
  </form>

  <div class="liste">
    @for (salle of salles(); track salle.id) {
      <div class="card ligne">
        <span>{{ salle.nom }}</span>
        <span class="mono">{{ salle.capacite }} places</span>
      </div>
    }
  </div>
</div>
